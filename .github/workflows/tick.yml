name: CHRONICON Tick

on:
  schedule:
    # 4x denně: 6:00, 12:00, 18:00, 00:00 UTC+1 (Prague)
    # GitHub Actions cron běží v UTC — odečti 1h (v létě CEST = UTC+2, odečti 2h)
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch:
    # Manuální spuštění z GitHub UI (tlačítko Run workflow)

jobs:
  tick:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CHRONICON tick
        run: node cron.js --once

      - name: Commit snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chronicon: tick'
          file_pattern: 'data/chronicon_snapshot.json data/gamestate.json'
